---
apiVersion: v1
kind: Secret
metadata:
  name: token-exchange-credentials
  namespace: kagenti-system
type: Opaque
stringData:
  CLIENT_SECRET: "exchange-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-exchange-service
  namespace: kagenti-system
  labels:
    app: token-exchange-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-exchange-service
  template:
    metadata:
      labels:
        app: token-exchange-service
    spec:
      containers:
        - name: token-exchange-service
          image: localhost:5000/token-exchange-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: grpc
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
            - name: ISSUER_URL
              value: "http://keycloak.localtest.me:8080"
            - name: REALM
              value: "waypoint-poc"
            - name: CLIENT_ID
              value: "token-exchange-service"
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: token-exchange-credentials
                  key: CLIENT_SECRET
            - name: LISTEN_ADDR
              value: ":9090"
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: token-exchange-service
  namespace: kagenti-system
spec:
  selector:
    app: token-exchange-service
  ports:
    - port: 9090
      targetPort: 9090
      name: grpc
      appProtocol: grpc
