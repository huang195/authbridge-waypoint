---
# agent-ns: ambient mode + agent-waypoint (aud check: pass through or reject)
apiVersion: v1
kind: Namespace
metadata:
  name: agent-ns
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: agent-waypoint
---
# tool-ns: ambient mode + tool-waypoint for token exchange
apiVersion: v1
kind: Namespace
metadata:
  name: tool-ns
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: tool-waypoint
