---
# agent-ns: ambient mode + agent-waypoint for inbound JWT validation
apiVersion: v1
kind: Namespace
metadata:
  name: agent-ns
  labels:
    istio.io/dataplane-mode: ambient
---
# tool-ns: ambient mode + tool-waypoint for token exchange
apiVersion: v1
kind: Namespace
metadata:
  name: tool-ns
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: tool-waypoint
