---
# Waypoint proxy for tool-ns — handles L7 policies including ext_authz
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tool-waypoint
  namespace: tool-ns
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
