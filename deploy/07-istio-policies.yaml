---
# Inbound JWT validation (agent-ns waypoint):
# Validates JWTs on requests TO the agent. No audience mapping for
# echo-agent, so ext_authz validates and passes through without exchange.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: inbound-jwt-validation
  namespace: agent-ns
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: agent-waypoint
  action: CUSTOM
  provider:
    name: kagenti-token-exchange
  rules:
    - {}
---
# Outbound token exchange (tool-ns waypoint):
# When an agent calls a tool, the tool-ns waypoint intercepts the request
# and calls ext_authz to validate the agent's JWT and exchange it for a
# tool-scoped token via RFC 8693.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: outbound-token-exchange
  namespace: tool-ns
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: tool-waypoint
  action: CUSTOM
  provider:
    name: kagenti-token-exchange
  rules:
    - {}
