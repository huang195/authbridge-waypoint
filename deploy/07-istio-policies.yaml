---
# Inbound (agent-ns waypoint):
# ext_authz validates JWT; token aud includes "demo-agent" → pass through.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: inbound-jwt-validation
  namespace: agent-ns
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: agent-waypoint
  action: CUSTOM
  provider:
    name: kagenti-token-exchange
  rules:
    - {}
---
# Outbound token exchange (tool-ns waypoint):
# When the agent calls ANY tool in tool-ns, the waypoint intercepts the
# request and calls ext_authz. The audience is derived from the destination
# hostname (e.g. echo-tool, time-tool), so adding a new tool requires
# no changes to this policy.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: outbound-token-exchange
  namespace: tool-ns
spec:
  targetRefs:
    - kind: Gateway
      group: gateway.networking.k8s.io
      name: tool-waypoint
  action: CUSTOM
  provider:
    name: kagenti-token-exchange
  rules:
    - {}
