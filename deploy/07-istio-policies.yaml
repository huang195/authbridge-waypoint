---
# CUSTOM action: call ext_authz for JWT validation + token exchange.
# The waypoint delegates to the token-exchange-service, which validates
# the agent's JWT and exchanges it for a tool-scoped token.
# Policy evaluation order: CUSTOM → DENY → ALLOW
# Note: CUSTOM action does not support from.source.namespaces — use a
# separate ALLOW policy for namespace restriction.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: token-exchange
  namespace: tool-ns
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: echo-tool
  action: CUSTOM
  provider:
    name: kagenti-token-exchange
  rules:
    - {} # Match all requests to echo-tool; namespace filtering done by ALLOW policy
---
# ALLOW: defense-in-depth — only agents from agent-ns can reach echo-tool.
# Even if ext_authz is misconfigured, only pods from agent-ns can reach the tool.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-agent-to-tool
  namespace: tool-ns
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: echo-tool
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["agent-ns"]
