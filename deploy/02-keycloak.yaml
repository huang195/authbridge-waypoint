---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: keycloak
data:
  realm.json: |
    {
      "realm": "waypoint-poc",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "clients": [
        {
          "clientId": "echo-agent",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "agent-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": false,
          "defaultClientScopes": ["openid"]
        },
        {
          "clientId": "echo-tool",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "tool-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "defaultClientScopes": ["openid"]
        },
        {
          "clientId": "token-exchange-service",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "exchange-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": false,
          "defaultClientScopes": ["openid"]
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "user",
            "description": "Regular user"
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3
          args:
            - start-dev
            # token-exchange: enables RFC 8693 token exchange grant type
            # admin-fine-grained-authz:v1: enables per-client token-exchange permissions
            # NOTE: explicit :v1 is required — without it KC 26 silently ignores the feature
            - --features=token-exchange,admin-fine-grained-authz:v1
            - --import-realm
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
            items:
              - key: realm.json
                path: waypoint-poc-realm.json
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
---
# NodePort for external access during testing
apiVersion: v1
kind: Service
metadata:
  name: keycloak-np
  namespace: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
